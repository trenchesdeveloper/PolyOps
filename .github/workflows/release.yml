name: Release

# Tag-triggered release. Push a tag like `v0.0.2` on `main` to publish:
#   - `polyops` to crates.io
#   - `polyops` + 7 per-platform binary packages to npm
# The tag version MUST match the workspace version (the `validate` job
# enforces this before anything is published).
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ------------------------------------------------------------------
  # Gate: versions agree, code is clean, tests pass, npm packs.
  # Nothing publishes unless this is green.
  # ------------------------------------------------------------------
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so we can check the tag is on main
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crates/polyops-napi/package-lock.json

      - name: Refuse to publish a tag that isn't on main
        run: |
          git fetch --no-tags --depth=2147483647 origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME ($GITHUB_SHA) is not an ancestor of origin/main. Releases must be tagged on main — merge first, then tag the merged commit."
            exit 1
          fi
          echo "✓ tagged commit $GITHUB_SHA is on main"

      - name: Tag version matches workspace + package.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VER="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          NPM_VER="$(node -p "require('./crates/polyops-napi/package.json').version")"
          echo "tag=$TAG cargo=$CARGO_VER npm=$NPM_VER"
          if [ "$TAG" != "$CARGO_VER" ] || [ "$TAG" != "$NPM_VER" ]; then
            echo "::error::Version mismatch — tag=$TAG cargo=$CARGO_VER npm=$NPM_VER"
            exit 1
          fi

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

      - name: npm build + test + pack (dry-run)
        working-directory: crates/polyops-napi
        run: |
          npm ci
          npm run build
          git diff --exit-code -- index.js index.d.ts \
            || { echo "::error::index.js/index.d.ts are stale — run 'npm run build' in crates/polyops-napi and commit them"; exit 1; }
          npm test
          npm pack --dry-run

  # ------------------------------------------------------------------
  # crates.io publish (pure-Rust crate only; polyops-napi is publish=false).
  # ------------------------------------------------------------------
  publish-crate:
    name: publish-crate
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo publish polyops (idempotent)
        run: |
          set -euo pipefail
          VERSION="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if curl -fsS "https://index.crates.io/po/ly/polyops" | grep -q "\"vers\":\"${VERSION}\""; then
            echo "✓ polyops ${VERSION} already on crates.io — skipping"
          else
            cargo publish -p polyops --token "$CRATES_IO_TOKEN"
          fi
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # ------------------------------------------------------------------
  # Build the native addon for every supported platform.
  # Linux cross targets (aarch64, musl) build via Zig; the rest are native.
  # ------------------------------------------------------------------
  build-npm-artifacts:
    name: build ${{ matrix.target }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            host: macos-latest
            zig: false
          - target: aarch64-apple-darwin
            host: macos-latest
            zig: false
          - target: x86_64-pc-windows-msvc
            host: windows-latest
            zig: false
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-latest
            zig: false
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-latest
            zig: true
          - target: x86_64-unknown-linux-musl
            host: ubuntu-latest
            zig: true
          - target: aarch64-unknown-linux-musl
            host: ubuntu-latest
            zig: true
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crates/polyops-napi/package-lock.json

      # Zig + cargo-zigbuild for the Linux cross targets.
      - name: Setup Zig
        if: ${{ matrix.zig }}
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild
        if: ${{ matrix.zig }}
        run: cargo install cargo-zigbuild --locked

      - name: npm ci
        working-directory: crates/polyops-napi
        run: npm ci

      - name: napi build (${{ matrix.target }})
        working-directory: crates/polyops-napi
        run: |
          if [ "${{ matrix.zig }}" = "true" ]; then
            npx napi build --platform --release --target ${{ matrix.target }} --zig
          else
            npx napi build --platform --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Upload .node artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: crates/polyops-napi/*.node
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Assemble the per-platform packages + the main package, publish to npm.
  # ------------------------------------------------------------------
  publish-npm:
    name: publish-npm
    needs: build-npm-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: crates/polyops-napi/package-lock.json

      - name: npm ci
        working-directory: crates/polyops-napi
        run: npm ci

      - name: Download all .node artifacts
        uses: actions/download-artifact@v4
        with:
          path: crates/polyops-napi/artifacts
          pattern: bindings-*
          merge-multiple: true

      - name: Move binaries into npm/<platform>/
        working-directory: crates/polyops-napi
        run: npx napi artifacts -d artifacts --dist npm

      # Idempotent + tolerant publish:
      #  - skip any platform package already on npm (so a re-run completes the
      #    rest instead of choking on already-published ones);
      #  - tolerate an individual package failing to publish (e.g. npm's spam
      #    filter blocking one new name) — record it, keep going, and still
      #    publish the main package so the working platforms ship now. The
      #    blocked platform fills in on a later run once it's unblocked, with
      #    no version bump (main already lists it in optionalDependencies).
      # optionalDependencies are computed from the npm/* dirs at the current
      # version, always for all platforms (forward-compatible), not read from
      # a committed block.
      - name: Publish platform packages (idempotent, tolerant) + inject optionalDependencies
        working-directory: crates/polyops-napi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -uo pipefail        # NOT -e: a single blocked package must not abort the release
          VERSION="$(node -p "require('./package.json').version")"
          DEPS='{}'
          FAILED=()
          for dir in npm/*/; do
            name="$(node -p "require('./${dir}package.json').name")"
            if npm view "${name}@${VERSION}" version >/dev/null 2>&1; then
              echo "✓ ${name}@${VERSION} already published — skipping"
            elif npm publish "$dir" --access public; then
              echo "→ published ${name}@${VERSION}"
              sleep 5   # space out publishes to avoid npm's spam heuristic
            else
              echo "::warning::could not publish ${name}@${VERSION} — continuing; re-run once it's unblocked"
              FAILED+=("${name}")
            fi
            DEPS="$(node -e "const d=${DEPS}; d['${name}']='${VERSION}'; console.log(JSON.stringify(d))")"
          done
          node -e "const fs=require('fs'); const p=require('./package.json'); p.optionalDependencies=${DEPS}; fs.writeFileSync('./package.json', JSON.stringify(p,null,2)+'\n')"
          echo 'main optionalDependencies set to:'; node -p "JSON.stringify(require('./package.json').optionalDependencies)"
          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "::warning::platform packages NOT published this run: ${FAILED[*]} — installs work on the others; those platforms fill in on a later run"
          fi

      - name: Publish main package (idempotent)
        working-directory: crates/polyops-napi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          # The loader + types must be present, or --ignore-scripts would ship
          # a main package with no index.js (exactly how 0.0.3 broke).
          test -f index.js && test -f index.d.ts \
            || { echo "::error::index.js/index.d.ts missing from checkout — refusing to publish a loader-less main package"; exit 1; }
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "polyops@${VERSION}" version >/dev/null 2>&1; then
            echo "✓ polyops@${VERSION} already published — skipping"
          else
            npm publish --access public --ignore-scripts
          fi

  # ------------------------------------------------------------------
  # Prove a fresh install resolves the right prebuilt and loads.
  # ------------------------------------------------------------------
  smoke-published:
    name: smoke ${{ matrix.os }}
    needs: publish-npm
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fresh install + load (with propagation retry)
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          mkdir smoke && cd smoke
          npm init -y >/dev/null
          for i in $(seq 1 10); do
            if npm install "polyops@$TAG"; then break; fi
            echo "install failed (registry propagation?), retry $i/10…"; sleep 30
          done
          node -e "let p; try { p = require('polyops'); } catch (e) { const m = String((e && e.message) || e); if (e && e.code === 'MODULE_NOT_FOUND' && /Cannot find module 'polyops-/.test(m)) { console.log('::warning::prebuilt for this platform not published yet — skipping load check: ' + m.split(String.fromCharCode(10))[0]); process.exit(0); } console.error('unexpected load failure:', e); process.exit(1); } const need = ['intersection','union','diff','xor']; const have = Object.keys(p); if (!need.every(f => have.includes(f))) { console.error('missing exports; got', have); process.exit(1); } const r = p.intersection([[[0,0],[2,0],[2,2],[0,2],[0,0]]],[[[1,1],[3,1],[3,3],[1,3],[1,1]]]); if (!r) { console.error('intersection returned null'); process.exit(1); } console.log('ok', JSON.stringify(have), JSON.stringify(r));"
