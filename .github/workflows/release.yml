name: Release

# Tag-triggered release. Push a tag like `v0.0.2` on `main` to publish:
#   - `polyops` to crates.io
#   - `polyops` + 7 per-platform binary packages to npm
# The tag version MUST match the workspace version (the `validate` job
# enforces this before anything is published).
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ------------------------------------------------------------------
  # Gate: versions agree, code is clean, tests pass, npm packs.
  # Nothing publishes unless this is green.
  # ------------------------------------------------------------------
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crates/polyops-napi/package-lock.json

      - name: Tag version matches workspace + package.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VER="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          NPM_VER="$(node -p "require('./crates/polyops-napi/package.json').version")"
          echo "tag=$TAG cargo=$CARGO_VER npm=$NPM_VER"
          if [ "$TAG" != "$CARGO_VER" ] || [ "$TAG" != "$NPM_VER" ]; then
            echo "::error::Version mismatch — tag=$TAG cargo=$CARGO_VER npm=$NPM_VER"
            exit 1
          fi

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

      - name: npm build + test + pack (dry-run)
        working-directory: crates/polyops-napi
        run: |
          npm ci
          npm run build
          npm test
          npm pack --dry-run

  # ------------------------------------------------------------------
  # crates.io publish (pure-Rust crate only; polyops-napi is publish=false).
  # ------------------------------------------------------------------
  publish-crate:
    name: publish-crate
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo publish polyops
        run: cargo publish -p polyops --token "$CRATES_IO_TOKEN"
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # ------------------------------------------------------------------
  # Build the native addon for every supported platform.
  # Linux cross targets (aarch64, musl) build via Zig; the rest are native.
  # ------------------------------------------------------------------
  build-npm-artifacts:
    name: build ${{ matrix.target }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            host: macos-latest
            zig: false
          - target: aarch64-apple-darwin
            host: macos-latest
            zig: false
          - target: x86_64-pc-windows-msvc
            host: windows-latest
            zig: false
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-latest
            zig: false
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-latest
            zig: true
          - target: x86_64-unknown-linux-musl
            host: ubuntu-latest
            zig: true
          - target: aarch64-unknown-linux-musl
            host: ubuntu-latest
            zig: true
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crates/polyops-napi/package-lock.json

      # Zig + cargo-zigbuild for the Linux cross targets.
      - name: Setup Zig
        if: ${{ matrix.zig }}
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild
        if: ${{ matrix.zig }}
        run: cargo install cargo-zigbuild --locked

      - name: npm ci
        working-directory: crates/polyops-napi
        run: npm ci

      - name: napi build (${{ matrix.target }})
        working-directory: crates/polyops-napi
        run: |
          if [ "${{ matrix.zig }}" = "true" ]; then
            npx napi build --platform --release --target ${{ matrix.target }} --zig
          else
            npx napi build --platform --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Upload .node artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: crates/polyops-napi/*.node
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Assemble the per-platform packages + the main package, publish to npm.
  # ------------------------------------------------------------------
  publish-npm:
    name: publish-npm
    needs: build-npm-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: crates/polyops-napi/package-lock.json

      - name: npm ci
        working-directory: crates/polyops-napi
        run: npm ci

      - name: Download all .node artifacts
        uses: actions/download-artifact@v4
        with:
          path: crates/polyops-napi/artifacts
          pattern: bindings-*
          merge-multiple: true

      - name: Move binaries into npm/<platform>/
        working-directory: crates/polyops-napi
        run: npx napi artifacts -d artifacts --dist npm

      - name: Publish platform packages + inject optionalDependencies
        working-directory: crates/polyops-napi
        run: npx napi prepublish -t npm --skip-gh-release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        working-directory: crates/polyops-napi
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ------------------------------------------------------------------
  # Prove a fresh install resolves the right prebuilt and loads.
  # ------------------------------------------------------------------
  smoke-published:
    name: smoke ${{ matrix.os }}
    needs: publish-npm
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fresh install + load (with propagation retry)
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          mkdir smoke && cd smoke
          npm init -y >/dev/null
          for i in 1 2 3 4 5 6; do
            if npm install "polyops@$TAG"; then break; fi
            echo "install failed (registry propagation?), retry $i…"; sleep 20
          done
          node -e "const p=require('polyops'); const need=['intersection','union','diff','xor']; const have=Object.keys(p); if(!need.every(f=>have.includes(f))){console.error('missing exports; got',have);process.exit(1)} const r=p.intersection([[[0,0],[2,0],[2,2],[0,2],[0,0]]],[[[1,1],[3,1],[3,3],[1,3],[1,1]]]); if(!r){console.error('intersection returned null');process.exit(1)} console.log('ok',have,JSON.stringify(r));"
