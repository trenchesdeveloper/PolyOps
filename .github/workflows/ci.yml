name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt-clippy:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # ---------------------------------------------------------------------
  # Parity job — currently runs only the goldens-generation smoke test
  # to confirm the harness still works against upstream's fixtures.
  #
  # The actual parity tests in `crates/polyops/tests/parity.rs` are
  # `#[ignore]`d and will panic at `polyops::boolean_op`'s `todo!()`
  # until the algorithm is implemented. Once `boolean_op` returns real
  # output, uncomment the "Run parity tests" step below and drop the
  # `#[ignore]` attributes per-operation as each goes green.
  # ---------------------------------------------------------------------
  parity:
    name: parity harness (goldens only, pre-algorithm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Clone upstream w8r/martinez
        run: git clone --depth 1 https://github.com/w8r/martinez ../martinez
      - name: Install parity harness deps
        working-directory: parity
        run: npm install
      - name: Generate goldens
        working-directory: parity
        env:
          MARTINEZ_REPO: ${{ github.workspace }}/../martinez
        run: npm run generate
      # - name: Run parity tests
      #   run: cargo test --workspace -- --include-ignored
